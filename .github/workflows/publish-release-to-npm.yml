name: Publish Latest Release to NPM

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: publish-latest-release-to-npm
  cancel-in-progress: false

jobs:
  publish:
    name: Publish latest GitHub release to NPM
    runs-on: ubuntu-latest
    steps:
      - name: Checkout default branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve latest GitHub release
        id: latest_release
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const release = await github.rest.repos.getLatestRelease({ owner, repo });
            const tag = release.data.tag_name;

            if (!tag) {
              core.setFailed('Latest GitHub release does not have a tag.');
              return;
            }

            const version = tag.replace(/^v/, '');
            const semverPattern = /^\d+\.\d+\.\d+(?:-[0-9A-Za-z.-]+)?(?:\+[0-9A-Za-z.-]+)?$/;

            if (!semverPattern.test(version)) {
              core.setFailed(`Latest release tag "${tag}" does not map cleanly to an npm version.`);
              return;
            }

            core.setOutput('tag', tag);
            core.setOutput('version', version);

      - name: Checkout latest release tag
        run: |
          git fetch --force --tags
          git checkout "${{ steps.latest_release.outputs.tag }}"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        run: npm ci

      - name: Build bundled web client
        run: NEOAGENT_BACKEND_URL= npm run flutter:build:web

      - name: Verify production web bundle
        run: |
          if rg -n "http://localhost:3333|127\\.0\\.0\\.1:3333" server/public/main.dart.js; then
            echo "Bundled web client still points at localhost."
            exit 1
          fi

      - name: Set package version from release tag
        run: npm version "${{ steps.latest_release.outputs.version }}" --no-git-tag-version --allow-same-version

      - name: Check npm auth
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm whoami --registry=https://registry.npmjs.org/

      - name: Ensure version is not already published
        run: |
          PACKAGE_NAME="$(node -p "require('./package.json').name")"
          VERSION="${{ steps.latest_release.outputs.version }}"

          if npm view "${PACKAGE_NAME}@${VERSION}" version --registry=https://registry.npmjs.org/ >/dev/null 2>&1; then
            echo "${PACKAGE_NAME}@${VERSION} is already published on npm."
            exit 1
          fi

      - name: Publish package
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish
