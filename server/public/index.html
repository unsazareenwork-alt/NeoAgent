<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="/">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="NeoAgent Flutter client for web and Android.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="NeoAgent">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="favicon.svg"/>
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>NeoAgent</title>
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <script>
    (() => {
      const validPositive = (value) => Number.isFinite(value) && value > 0;

      // Flutter web engine asserts when DPR/viewport metrics become invalid.
      // On some host/browser setups this can transiently become 0/NaN.
      try {
        const currentDpr = Number(window.devicePixelRatio);
        if (!validPositive(currentDpr)) {
          Object.defineProperty(window, 'devicePixelRatio', {
            configurable: true,
            get: () => 1,
          });
        }
      } catch (_) {}

      try {
        const viewport = window.visualViewport;
        if (viewport) {
          const patch = (key, fallback) => {
            const current = Number(viewport[key]);
            if (!validPositive(current)) {
              Object.defineProperty(viewport, key, {
                configurable: true,
                get: () => fallback,
              });
            }
          };
          patch('scale', 1);
          patch('width', Math.max(1, window.innerWidth || 1));
          patch('height', Math.max(1, window.innerHeight || 1));
        }
      } catch (_) {}
    })();
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
