<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NeoAgent Admin</title>
  <link rel="stylesheet" href="/admin/admin.css">
  <style>
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    .login-wrap {
      width: 100%;
      max-width: 380px;
      padding: 20px;
    }

    .login-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 36px 32px 32px;
    }

    .brand {
      margin-bottom: 32px;
    }

    .brand-mark {
      width: 32px;
      height: 32px;
      border-radius: 9px;
    }

    .brand-mark img {
      width: 32px;
      height: 32px;
    }

    .login-heading {
      font-size: 20px;
      font-weight: 700;
      color: var(--text);
      letter-spacing: -0.3px;
      margin-bottom: 4px;
    }

    .login-sub {
      font-size: 13px;
      color: var(--text-muted);
      margin-bottom: 28px;
    }

    .login-sub code {
      font-family: var(--font-mono);
      font-size: 12px;
      background: var(--bg-secondary);
      padding: 1px 5px;
      border-radius: 4px;
      color: var(--accent);
    }

    .submit-btn {
      width: 100%;
      padding: 11px;
      font-size: 14px;
      margin-top: 4px;
    }
  </style>
</head>
<body>
  <div class="login-wrap">
    <div class="login-card">
      <div class="brand">
        <div class="brand-mark">
          <img src="/admin/logo.svg" width="32" height="32" alt="">
        </div>
        <div>
          <div class="brand-name">NeoAgent</div>
          <div class="brand-sub">Admin</div>
        </div>
      </div>

      <h1 class="login-heading">Sign in</h1>
      <p class="login-sub">
        Credentials are in your <code>.env</code> or via <code>neoagent admin</code>
      </p>

      <div class="alert alert-error" id="error" role="alert"></div>

      <form id="form" novalidate>
        <div class="field">
          <label for="username">Username</label>
          <input
            id="username"
            type="text"
            autocomplete="username"
            autofocus
            required
            spellcheck="false"
            autocorrect="off"
            autocapitalize="none"
          >
        </div>
        <div class="field">
          <label for="password">Password</label>
          <input
            id="password"
            type="password"
            autocomplete="current-password"
            required
          >
        </div>
        <button type="submit" class="btn btn-primary submit-btn" id="submit-btn">
          Sign in
        </button>
      </form>
    </div>
  </div>

  <script>
    const form     = document.getElementById('form');
    const submitBtn = document.getElementById('submit-btn');
    const errorEl  = document.getElementById('error');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errorEl.classList.remove('visible');
      submitBtn.disabled = true;
      submitBtn.textContent = 'Signing in…';

      try {
        const res = await fetch('/admin/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            username: document.getElementById('username').value.trim(),
            password: document.getElementById('password').value,
          }),
        });

        if (res.ok) {
          window.location.replace('/admin');
          return;
        }

        const body = await res.json().catch(() => ({}));
        errorEl.textContent = body.error || 'Invalid credentials';
        errorEl.classList.add('visible');
      } catch {
        errorEl.textContent = 'Network error — is the server running?';
        errorEl.classList.add('visible');
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = 'Sign in';
      }
    });
  </script>
</body>
</html>
