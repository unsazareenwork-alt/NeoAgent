name: neoagent_flutter
description: NeoAgent client for Flutter web, Android, Windows, macOS, and Linux.
publish_to: none
version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_markdown: ^0.7.4+1
  google_fonts: ^6.3.1
  image: ^4.5.4
  http: ^1.5.0
  connectivity_plus: 6.1.5
  shared_preferences: ^2.5.3
  flutter_secure_storage: ^9.2.2
  socket_io_client: ^3.1.2
  universal_ble: ^1.1.0
  permission_handler: ^12.0.1
  path_provider: ^2.1.5
  package_info_plus: ^8.3.1
  audioplayers: ^6.1.0
  qr_flutter: ^4.1.0
  record: ^6.1.1
  window_manager: ^0.5.1
  tray_manager: ^0.5.2
  hotkey_manager: ^0.2.3
  desktop_audio_capture:
    path: third_party/desktop_audio_capture
  launch_at_startup: ^0.5.1
  mobile_scanner: ^7.2.0
  geolocator: ^13.0.2
  flutter_background_service: ^5.1.0
  notification_listener_service: ^0.3.5
  url_launcher: ^6.3.2
  video_player: ^2.9.2
  flutter_animate: ^4.5.2

dependency_overrides:
  flutter_secure_storage_linux:
    path: third_party/flutter_secure_storage_linux

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - web/icons/Icon-192.png
    - assets/branding/app_icon_256.png
    - assets/branding/tray_icon_template.png
    - assets/branding/onboarding_intro.mp4
